<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- A — white, italic serif -->
  <text
    x="38"
    y="352"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-weight="700"
    font-size="272"
    fill="#E6EDF3"
    opacity="0.95"
  >A</text>

  <!-- W — cyan, upright serif -->
  <text
    x="212"
    y="352"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="normal"
    font-weight="700"
    font-size="272"
    fill="#38BDF8"
  >W</text>

  <!-- Cyan dot — brand signature -->
  <circle cx="475" cy="338" r="21" fill="#38BDF8"/>

  <!-- Bottom accent dashes -->
  <rect x="38"  y="388" width="116" height="7" rx="3.5" fill="#38BDF8" opacity="0.40"/>
  <rect x="166" y="388" width="72"  height="7" rx="3.5" fill="#38BDF8" opacity="0.18"/>

</svg>
